name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Download assets from S3
        run: |
          pip install awscli --quiet
          mkdir -p public/assets
          aws s3 cp s3://$AWS_BUCKET/ public/assets --recursive --endpoint-url $AWS_ENDPOINT_URL
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}

      - name: Build and prerender
        run: |
          cd app/briantakita.me
          bun ./build-and-serve.ts &
          sleep 5
          bun ./prerender.ts
          kill %1
          cp -r dist/browser--dev/* dist/static/
          cp -r ../../public/assets/* dist/static/
        env:
          ASSETS_BRIANTAKITA_ME__BUCKET_URL: ${{ secrets.ASSETS_BRIANTAKITA_ME__BUCKET_URL }}
          LINKUMENT_PUB__BUCKET_URL: ""

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy app/briantakita.me/dist/static --project-name briantakita-me
